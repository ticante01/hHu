<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reserve Table</title>

<style>

*{
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
padding:60px;
}

.container{
width:600px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

h1{
margin-bottom:30px;
}

label{
font-size:14px;
color:#555;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:20px;
border:1px solid #ddd;
border-radius:6px;
}

.times{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:30px;
}

.time{
padding:12px;
border:1px solid #ccc;
border-radius:6px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.time:hover{
border-color:black;
}

.time.selected{
background:black;
color:white;
border-color:black;
}

.time.disabled{
background:#eee;
color:#aaa;
cursor:not-allowed;
}

button{
width:100%;
padding:15px;
border:none;
background:black;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#333;
}

.success{
margin-top:20px;
color:green;
}

</style>

</head>

<body>

<div class="container">

<h1>Reserve a Table</h1>

<label>Date</label>
<input type="date" id="date">

<label>Guests</label>
<select id="guests">
<option>1</option>
<option>2</option>
<option selected>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>

<h3>Available Times</h3>

<div class="times" id="times"></div>

<label>Name</label>
<input type="text" id="name">

<label>Phone</label>
<input type="text" id="phone">

<button id="reserve">Reserve Table</button>

<div class="success" id="success"></div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/XXXX/exec"

const openingTimes=[
"17:00","17:30","18:00","18:30",
"19:00","19:30","20:00","20:30",
"21:00","21:30"
]

let selectedTime=null

const timesContainer=document.getElementById("times")

function renderTimes(){

timesContainer.innerHTML=""

openingTimes.forEach(time=>{

let div=document.createElement("div")
div.className="time"
div.innerText=time

div.onclick=()=>{

document.querySelectorAll(".time")
.forEach(t=>t.classList.remove("selected"))

div.classList.add("selected")
selectedTime=time

}

timesContainer.appendChild(div)

})

}

renderTimes()

document.getElementById("reserve").onclick=async function(){

let date=document.getElementById("date").value
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let guests=document.getElementById("guests").value

if(!date || !selectedTime || !name || !phone){

alert("Please fill all fields")
return

}

let start=date+"T"+selectedTime+":00"

let startDate=new Date(start)

let endDate=new Date(startDate.getTime()+2*60*60*1000)

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({

name,
phone,
guests,
table:"Auto",
start:startDate.toISOString(),
end:endDate.toISOString()

})
})

document.getElementById("success").innerText="Reservation confirmed!"

}

</script>

</body>
</html>
